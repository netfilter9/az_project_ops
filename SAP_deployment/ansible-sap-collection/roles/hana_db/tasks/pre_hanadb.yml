---

- name: pre_hanadb_config | anf configuration
  block:
    - name: Create netapp-hana.conf
      blockinfile:
        path: /etc/sysctl.d/netapp-hana.conf
        marker: "# {mark} ANF Configuration"
        create: yes
        block: |
          net.core.rmem_max = 16777216
          net.core.wmem_max = 16777216
          net.core.rmem_default = 16777216
          net.core.wmem_default = 16777216
          net.core.optmem_max = 16777216
          net.ipv4.tcp_rmem = 65536 16777216 16777216
          net.ipv4.tcp_wmem = 65536 16777216 16777216
          net.core.netdev_max_backlog = 300000
          net.ipv4.tcp_slow_start_after_idle=0
          net.ipv4.tcp_no_metrics_save = 1
          net.ipv4.tcp_moderate_rcvbuf = 1
          net.ipv4.tcp_window_scaling = 1
          net.ipv4.tcp_timestamps = 1
          net.ipv4.tcp_sack = 1
    - name: Create ms-az.conf
      blockinfile:
        path: /etc/sysctl.d/ms-az.conf
        create: yes
        marker: "# {mark} ANF Configuration"
        block: |
          ipv6.conf.all.disable_ipv6 = 1
          net.ipv4.tcp_max_syn_backlog = 16348
          net.ipv4.ip_local_port_range = 40000 65300
          net.ipv4.conf.all.rp_filter = 0
          sunrpc.tcp_slot_table_entries = 128
          vm.swappiness=10
  when: (sap.filesystem is defined and sap.filesystem == 'anf')

- name: pre_hanadb_config | sshd-config 
  block:
    - name: password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^PasswordAuthentication no"
        line: "PasswordAuthentication yes"
    - name: sshd restart
      service:
        name: sshd
        state: restarted
  when: hana_scale_out is defined


- name: pre_hanadb_config | RHEL 8.x prerequisite
  block:
    - name: abrtd | abrtd stopped
      service:
        name: abrtd
        state: stopped
        enabled: no

    - name: abrt-ccpp | abrt-ccpp stopped
      service:
        name: abbrt-ccpp
        state: stopped
        enabled: no
  
  when: ansible_os_family == 'RedHat' and ansible_distribution_major_version >= '8'
  ignore_errors: true

- name: pre_hanadb_config | RHEL 8.x prerequisite
  block:
    - name: Create /etc/security/limits.d/99-sap.conf
      blockinfile:
        path: /etc/security/limits.d/99-sap.conf
        marker: "# {mark} ANF Configuration"
        create: yes
        block: |
          soft core 0
          hard core 0

    - name: kdump | kdump stopped
      service:
        name: kdump
        state: stopped
        enabled: no
  
  when: ansible_os_family == 'RedHat' and ansible_distribution_major_version >= '8'

  