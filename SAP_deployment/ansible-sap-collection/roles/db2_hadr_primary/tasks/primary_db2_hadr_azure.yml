 - name: run hadr commands on primary for SUSE
   command: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
   with_items:
     - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_HOST "{{ node1 }}"         
     - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_SVC "{{ sap.firewall.primary_port | default('51012') }}"
     - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_REMOTE_HOST "{{ node2 }}"
     - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_REMOTE_SVC "{{ sap.firewall.secondary_port | default('51013') }}"
     - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_REMOTE_INST db2{{ sap.db.sid | lower }}
     - db2 update db cfg for {{ sap.db.sid | upper }} using LOGINDEXBUILD ON
     - db2 update db cfg for {{ sap.db.sid | upper }} using INDEXREC RESTART
     - db2 update db cfg for {{ sap.db.sid | upper }} using LOGARCHMETH1 LOGRETAIN
     - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_PEER_WINDOW 900
     - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_TIMEOUT 60
     - db2set DB2COMM=tcpip
   register: db2cmd
   when: ansible_os_family == 'Suse'

 - name: Deactivating the database
   command: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
   with_items:
    - db2 terminate
    - db2 deactivate db {{ sap.db.sid | upper }}
  
 - name: Take offline backup
   command: 
    cmd: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
    creates: /db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP/{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.*
   with_items:
    - db2 backup database {{ sap.db.sid | upper }} to /db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP 
   register: backup

 - name: verify backup
   command: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
   with_items:
    - db2ckbkp /db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP/{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.*
    - db2 activate db {{ sap.db.sid | upper }}
   register: verout

 - name: output of backup verification
   debug:
    var: verout
  
    
