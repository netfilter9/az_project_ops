---

- name: main | folder creation to mount the anf
  file:
    path: "{{ item.path }}"
    state: directory
  loop: "{{ anf_vol }}"

- name: main | mount the anf
  mount:
    path: "{{ item.path }}"
    src: "{{ item.source }}"
    fstype: "{{ item.fstype | default('nfs') }}"
    state: "mounted"
    opts: "{{ item.opts | default('nfsvers=4.1,rsize=1048576,wsize=1048576,hard,timeo=600,retrans=2,noresvport,_netdev') }}"
  loop: "{{ anf_vol }}"
   
- name: main | folder creation inside the anf
  file:
    path: "{{ item.path }}"
    mode: "{{ item.mode | default ('755') }}"
    state: directory
  loop: "{{ anf_folders }}"

- name: main | unmount the anf
  mount:
    path: "{{ item.path }}"
    state: "absent"
  loop: "{{ anf_vol }}"

