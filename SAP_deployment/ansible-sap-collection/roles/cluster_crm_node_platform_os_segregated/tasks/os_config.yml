- name: os_config | changing values in /etc/systemd/system.conf
  lineinfile:
    path: /etc/systemd/system.conf
    regexp: '#DefaultTasksMax='
    line: DefaultTasksMax=4096
    create: yes

- name: os_config | reload the systemd daemon
  systemd:
    daemon_reload: yes

- name: os_config | tweak sysctl entries
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
  with_items:
    - { name: vm.dirty_bytes, value: 629145600 }
    - { name: vm.dirty_background_bytes, value: 314572800 }

