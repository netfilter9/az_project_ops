---
- name: cluster_packages | ensure required cluster agent packages are installed
  package:
    name: 
      - fence-agents
      - resource-agents
      - socat
    state: present

- name: main | logd start and enable
  service:
    name: logd
    state: started
    enabled: yes

- name: suse | Azure Python SDK installation
  import_tasks: sdk.yml
  tags:
    - sdk

- name: suse | setup os config
  import_tasks: os_config.yml
  tags:
    - os_config

- name: suse | setup ssh keys
  import_tasks: ssh_key_setup.yml
  tags:
    - ssh

- name: suse | run base ha cluster commands
  import_tasks: suse_ha_cluster.yml
  tags:
    - suse_ha_cluster

- name: corosync | tweaks corosync settings in /etc/corosync/corosync.conf
  lineinfile:
    path: /etc/corosync/corosync.conf
    regexp: "{{ item.property | regex_escape() }}"
    line: "\t{{ item.property }}  {{ item.value }}"
  loop:
  - { property: 'token:', value: '30000' }
  - { property: 'token_retransmits_before_loss_const:', value: '10' }
  - { property: 'join:', value: '60' }
  - { property: 'consensus:', value: '36000' }
  - { property: 'max_messages:', value: '20' }
  - { property: 'expected_votes:', value: '2' }
  - { property: 'two_node:', value: '1' }
  register: result

- name: corosync restart
  service:
    name: corosync
    state: restarted
    enabled: yes
  when: result.changed