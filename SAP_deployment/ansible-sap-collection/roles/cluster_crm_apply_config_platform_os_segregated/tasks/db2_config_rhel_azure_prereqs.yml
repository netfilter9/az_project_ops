- name: adding firewall rule for probe port in azure
  command: "{{ item }}"
  with_items: 
    - sudo firewall-cmd --add-port=62500/tcp --permanent
    - sudo firewall-cmd --reload

- name: configuration prereqs
  command: su - db2{{ sap.db.sid|lower }} -c "db2start"
  register: db2start
  failed_when:
    - db2start.failed
    - not (db2start.stderr.find("The database manager is already active.")) 

- name: configuration prereqs
  command: su - db2{{ sap.db.sid|lower }} -c "db2stop force"
  
- name: configuration prereqs
  command: "{{ item }}"
  with_items: 
    - sudo yum install ksh -y

- name: configuration prereqs
  command: "{{ item }}"
  with_items: 
    - sudo usermod -s /bin/ksh "db2{{ sap.db.sid|lower }}"

- name: cluster configuration for redhat db2
  block:
  - name: pcs configuration 
    command: pcs cluster reload corosync

  - name: pcs configuration 
    command: sudo pcs property set maintenance-mode="true"

  - name: pcs cluster configuration for RHEL version >= 8
    import_tasks: db2_rhel8_pcs_aws.yml
    when: 
      - ansible_distribution_major_version >= '8'

  - name: main | set cluster maintenace mode
    command: sudo pcs property set maintenance-mode="false"
  when: ansible_hostname == node1