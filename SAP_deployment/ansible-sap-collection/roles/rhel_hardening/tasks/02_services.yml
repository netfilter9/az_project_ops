- name: "Ensure tftp server is not enabled"
  stat:
    path: /etc/xinetd.d/tftp
  register: tftp_service
  tags:
    - level1
    - rhel7cis_disable_service_checks is defined and rhel7cis_disable_service_checks
    

- name: "Ensure tftp server is not enabled"
  command: chkconfig tftp off
  notify: restart xinetd
  when:
    - rhel7cis_level1 is defined and rhel7cis_level1
    - rhel7cis_disable_service_checks is defined and rhel7cis_disable_service_checks
    - tftp_service.stat.exists and rhel7cis_tftp_server == false
  tags:
    - level1
    
