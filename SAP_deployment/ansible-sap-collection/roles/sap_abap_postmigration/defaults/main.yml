---
# defaults file for sap-abap-postmigration
abap_post_migration_list:
   - { export_script: "ZCM_SGEN_EXP_GENERATED_OBJECTS.txt", input_params: 'ALL,X,INS,X' }
   - { export_script: "ZCM_STZAC_EXP_CUSTOM_TIMEZONE.txt", input_params: EXPORT, restore_script: "ZCM_STZAC_UPD_CUSTOM_TIMEZONE.txt", unique_columns: "[{'COL1':'CLIENT'}]"  }
   - { export_script: "ZCM_WE20_EXP_PARTNER_PROFILE.txt", input_params: EXPORT, restore_script: "ZCM_WE20_UPD_PARTNER_PROFILE.txt", unique_columns: "[{'COL1':'MANDT','COL2':'PARNUM','COL3':'PARTYP'},{'COL1':'MANDT','COL2':'SNDPRN','COL3':'SNDPRT','COL4':'SNDPFC','COL5':'MESTYP','COL6':'MESCOD','COL7':'MESFCT','COL8':'TEST'},{'COL1':'MANDT','COL2':'RCVPRN','COL3':'RCVPRT','COL4':'RCVPFC','COL5':'KAPPL','COL6':'KSCHL','COL7':'AENDE'},{'COL1':'MANDT','COL2':'SNDPRN','COL3':'SNDPRT','COL4':'SNDPFC','COL5':'MESTYP','COL6':'MESCOD','COL7':'MESFCT','COL8':'TEST','COL9':'PARID'},{'COL1':'MANDT','COL2':'RCVPRN','COL3':'RCVPRT','COL4':'RCVPFC','COL5':'MESTYP','COL6':'MESCOD','COL7':'MESFCT','COL8':'TEST'},{'COL1':'MANDT','COL2':'PARNUM','COL3':'PARTYP','COL4':'PARFCT','COL5':'DIRECT','COL6':'MESTYP','COL7':'MESCOD','COL8':'MESFCT','COL9':'TEST'}]" }
   - { export_script: "ZCM_RZ70_EXP_SLD_REGISTRATION.txt", input_params: EXPORT, restore_script: "ZCM_RZ70_UPD_SLD_REGISTRATION.txt", unique_columns: "[{}]"  }
   - { export_script: "ZCM_SCC4_EXP_CLIENT_SETTINGS.txt", input_params: EXPORT, restore_script: "ZCM_SCC4_UPD_CLIENT_SETTINGS.txt", unique_columns: "[{'COL1':'mandt'}]"  }
   - { export_script: "ZCM_DB13_EXP_DBA_CALENDAR_JOBS.txt", input_params: EXPORT, restore_script: "ZBASIS_R_DB13_JOBSCHED_RESTORE.txt", unique_columns: "[{'COL1':'Day for DBA action','COL2':'Time for DBA action','COL3':'Schedule timestamp','COL4':'DBA type'},{'COL1':'Day for DBA action','COL2':'Time for DBA action','COL3':'Schedule timestamp','COL4':'Position'}]" }
   - { export_script: "ZCM_SE06_EXP_SYSTEM_SETTINGS.txt", input_params: EXPORT, restore_script: "ZCM_SE06_UPD_SYSTEM_SETTINGS.txt", unique_columns: "[{'COL1':'GlobalSetting'},{'COL1':'SoftwareComponent','COL2':'TechnicalName'},{'COL1':'NameRange','COL2':'Prefix','COL3':'TechID'}]"  }
   - { export_script: "ZCM_SM13_EXP_UPDATE_STATUS.txt", input_params: EXPORT, restore_script: "ZCM_SM13_UPD_UPDATE_STATUS.txt", unique_columns: "[{}]"  }
   - { export_script: "ZCM_SMQR_EXP_QUEUE.txt", input_params: DEREGISTER, restore_script: "ZCM_SMQR_EXP_QUEUE.txt", unique_columns: "[{},{}]"  }
   - { export_script: "ZCM_SM61_EXP_SERVER_GROUPS.txt", input_params: EXPORT, restore_script: "ZCM_SM61_UPD_SERVER_GROUPS.txt", unique_columns: "[{'COL1':'Group'},{'COL1':'Group','COL2':'Server'}]"  }
   - { export_script: "ZCM_SMQR_EXP_QUEUE.txt", input_params: EXPORT, restore_script: "ZCM_SMQR_UPD_QUEUE.txt", unique_columns: "[{},{'COL1':'Client','COL2':'Queuename'}]"  }
   - { export_script: "ZCM_SMQS_EXP_DESTINATION.txt", input_params: EXPORT, restore_script: "ZCM_SMQS_UPD_DESTINATION.txt", unique_columns: "[{},{'COL1':'Client','COL2':'Destination'}]"  }
   - { export_script: "ZCM_SLDAPICUST_EXP_SLDDATA.txt", input_params: EXPORT, restore_script: "ZCM_SLDAPICUST_UPD_SLDDATA.txt", unique_columns: "[{},{'COL1':'AliasName'}]"  }
   - { export_script: "ZCM_SPAD_EXP_PRINTER_LOCKUNLOC.txt", input_params: EXPORT, restore_script: "ZCM_SPAD_LOCK_UNLOCK_PRINTERS.txt", unique_columns: "[{'COL1':'OutputDeviceName'}]" }
   
abap_post_migration_rz21:   
   - { export_script: "ZCM_RZ21_DEL_OLDAPPL_SERV.txt", input_params: EXPORT, restore_script: "ZCM_RZ21_DEL_OLDAPPL_SERV.txt", instancename: ['{{ hostname }}_{{ target.sap.sid }}_{{ target.sap.instance_number.ascs }}'] }

abap_post_migration_httpurlloc:
   - { export_script: "ZCM_T_HTTPURLLOC_EXPORT.txt", input_params: EXPORT, restore_script: "ZCM_T_HTTPURLLOC_UPD.txt", unique_columns: "['MANDT','SORT_KEY','PROTOCOL']" }

abap_post_migration_ssl:
   - { export_script: "ZCM_STRUST_EXP_CERTIFICATE_750.txt", input_params: EXPORT, restore_script: "ZCM_STRUST_IMP_PSE_CERTIFICATE.txt" }

abap_post_migration_smlg:
   - { export_script: "ZCM_SMLG_EXP_LOGON_GROUPS.txt", input_params: EXPORT, restore_script: "ZCM_SMLG_UPD_LOGON_GROUPS.txt",instance_list: ['{{ hostname }}_{{ target.sap.sid }}_{{ target.sap.instance_number.ascs }}' ]  }

abap_post_migration_spad:
   - { export_script: "ZCM_SPAD_EXP_OPDEVICE_SERVERS.txt", input_params: EXPORT, restore_script: "ZCM_SPAD_UPD_OPDEVICE_SERVER.txt",unique_columns: "[{'COL1':'Outputdevicename'},{'COL1':'Servername'}]" }

abap_post_migration_rfc:
   - { export_script: "751_0000_ZCM_RZ12_EXP_RFC_GROUPS.txt", input_params: EXPORT, restore_script: "751_0000_ZCM_RZ12_UPDATE_RFC_GROUPS.txt", instance_list: ['{{ hostname }}_{{ target.sap.sid }}_{{ target.sap.instance_number.ascs }}']  }     

abap_post_validation_list:
   - { export_script: "ZCM_RZ70_CHK_SLD_CONNECTION.txt", input_params: EXPORT, restore_script: "",unique_columns: "[{}]"  }
