---
- name: main | set installation directory facts
  set_fact:
    install_dir: "{{ root_dir | default ('/usr/sap')}}"
    dbtype: "{{ sap.db.type | lower }}"
    ips_cms_dsnname: "{{ bods.ips.cms.dsnname | default(default_ips_cms_dsnname) }}"
    ips_audit_dsnname: "{{ bods.ips.audit.dsnname | default(default_ips_audit_dsnname) }}"

- name: main | install hana client
  import_tasks: hana_client.yml
  tags:
    - hana_client
  when: dbtype  == "hana"

- name: main | install ips
  import_tasks: ips_install.yml
  tags:
    - ips_install
