---
- name: main | create ds.params
  template:
    src: "ds.params.j2"
    dest: "{{ install_dir }}/{{ansible_hostname}}_ds.params"
    mode: "0644"

- name: main | install ds
  vars:
    env:
      PATH: '{% if dbtype == "sybase" %}{{ ansible_env.PATH }}{% else %}/usr/sap/hdbclient:{{ ansible_env.PATH }}{% endif %}'
      LD_LIBRARY_PATH: '{% if dbtype == "sybase" %}/sybase/SDK/{{ sap.db.sybase_ocs | default("OCS-16_0") }}/lib/:/sybase/SDK{% else %}/usr/sap/hdbclient{% endif %}'
      SYBASE: '{% if dbtype == "sybase" %}/sybase/{{sap.db.sid | upper}}{% endif %}'
  command:
    cmd: "./setup.sh -r {{ install_dir }}/{{ansible_hostname}}_ds.params -InstallDir {{ DS_dir }}"
    creates: "{{ install_dir }}/sapinst/LOGS/dslog_{{ ansible_hostname }}*.zip"
  args:
    chdir: "{{ install_dir }}/sapinst/DS"
  environment: "{{env}}"
  register: installds
  become: yes
  become_user: "{{admin_user}}"

- name: Create logs directory if it does not exist
  file:
    path: "{{ install_dir }}/sapinst/LOGS"
    state: directory
    mode: "0755"

- name: main | create zip file of installation logs
  archive:
    path: /tmp/sapinst_instdir
    dest: "{{ install_dir }}/sapinst/LOGS/sapinstdslog_{{ ansible_hostname }}_{{ ansible_date_time.iso8601 }}.zip"
    format: zip
    force_archive: true
  when: installds.changed

- name: main | tidy up params
  file:
    path: "{{ install_dir }}/{{ansible_hostname}}_ds.params"
    state: absent
