
- name: main | setup ssh keys
  include_tasks: ssh_key_setup.yml
  tags:
    - ssh

- name: cluster | copy files over
  become: yes
  command: 
    cmd: scp -o StrictHostKeyChecking=no {{ node1 }}:/db2/{{ sap.db.sid|upper }}/MEDIAS/BACKUP/{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.* /db2/{{ sap.db.sid|upper }}/MEDIAS/BACKUP/
    creates: /db2/{{ sap.db.sid|upper }}/MEDIAS/BACKUP/{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.* 

- name: permission | owner group change
  file:
    path: /db2/{{ sap.db.sid|upper }}
    owner: "db2{{ sap.db.sid|lower }}"
    group: "db{{ sap.db.sid|lower }}adm"
    recurse: yes

- name: find the backup filename
  command: find /db2/{{ sap.db.sid|upper }}/MEDIAS/BACKUP/ -name "{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.*"
  register: bfile

- name: capture timestamp
  set_fact:
    timestamp: "{{ bfile.stdout.split('.')[-2] }}"

- name: Value of timestamp
  debug:
    var: timestamp

- name: start database 
  command: su - db2{{ sap.db.sid|lower }} -c "db2start"
  register: db2start
  failed_when:
    - db2start.failed
    - not (db2start.stderr.find("The database manager is already active.")) 

- name: restore database 
  command: 
    cmd: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
    creates: /db2/{{ sap.db.sid|upper }}/logarch/restore_logfile.log
  with_items:
    - db2 restore database {{ sap.db.sid|upper }} from /db2/{{ sap.db.sid|upper }}/MEDIAS/BACKUP taken at {{ timestamp }}
  register: rest

- name: run hadr commands on secondary
  command: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
  with_items:
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_HOST "{{ node2 }}"
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_SVC {{ sap.db.sid | upper }}_HADR_2
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_REMOTE_HOST "{{ node1 }}"
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_REMOTE_SVC {{ sap.db.sid | upper }}_HADR_1
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_REMOTE_INST db2{{ sap.db.sid | lower }}
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_TIMEOUT 120
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_SYNCMODE NEARSYNC
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_PEER_WINDOW 300
    - db2 update db cfg for {{ sap.db.sid | upper }} using LOGINDEXBUILD ON
  register: db2cmd