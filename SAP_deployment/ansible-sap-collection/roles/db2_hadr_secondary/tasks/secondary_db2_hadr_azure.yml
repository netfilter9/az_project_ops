- name: cluster | copy files over
  command: 
    cmd: scp -o "StrictHostKeyChecking no" {{ node1 }}:/db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP/{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.* /db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP/
    creates: /db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP/{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.* 

- name: permission | owner group change
  file:
    path: /db2/{{ sap.db.sid|upper }}
    owner: "db2{{ sap.db.sid|lower }}"
    group: "db{{ sap.db.sid|lower }}adm"
    recurse: yes

- name: find the backup filename
  command: find /db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP/ -name "{{ sap.db.sid | upper }}.0.db2{{ sap.db.sid | lower }}.DBPART000.*"
  register: bfile

- name: capture timestamp
  set_fact:
    timestamp: "{{ bfile.stdout.split('.')[-2] }}"

- name: Value of timestamp
  debug:
    var: timestamp

- name: start database 
  command: su - db2{{ sap.db.sid|lower }} -c "db2start"
  register: db2start
  failed_when:
    - db2start.failed
    - not (db2start.stderr.find("The database manager is already active.")) 

- name: restore database 
  command: 
    cmd: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
    creates: /db2/{{ sap.db.sid|upper }}/logarch/restore_logfile.log
  with_items:
    - db2 restore database {{ sap.db.sid|upper }} from /db2/{{ sap.db.sid | upper }}/log_archive/MEDIAS/BACKUP taken at {{ timestamp }}
  register: rest

- name: run hadr commands on secondary for RHEL
  command: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
  with_items:
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_HOST "{{ node2 }}"
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_SVC "{{ sap.firewall.secondary_port | default('51013') }}"
    - db2 update db cfg for {{ sap.db.sid | upper }}  using HADR_REMOTE_HOST "{{ node1 }}"
    - db2 update db cfg for {{ sap.db.sid | upper }}  using HADR_REMOTE_SVC "{{ sap.firewall.primary_port | default('51012') }}"
    - db2 update db cfg for {{ sap.db.sid | upper }}  using HADR_REMOTE_INST db2{{ sap.db.sid | lower }}
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_PEER_WINDOW 900
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_TIMEOUT 60
    - db2set DB2COMM=tcpip
  register: db2cmd
  when: ansible_os_family == 'RedHat'

- name: run hadr commands on secondary for SUSE
  command: su - db2{{ sap.db.sid|lower }} -c "{{ item }}"
  with_items:
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_HOST "{{ node2 }}"
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_LOCAL_SVC "{{ sap.firewall.secondary_port | default('51013') }}"
    - db2 update db cfg for {{ sap.db.sid | upper }}  using HADR_REMOTE_HOST "{{ node1 }}"
    - db2 update db cfg for {{ sap.db.sid | upper }}  using HADR_REMOTE_SVC "{{ sap.firewall.primary_port | default('51012') }}"
    - db2 update db cfg for {{ sap.db.sid | upper }}  using HADR_REMOTE_INST db2{{ sap.db.sid | lower }}
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_PEER_WINDOW 900
    - db2 update db cfg for {{ sap.db.sid | upper }} using HADR_TIMEOUT 60
    - db2set DB2COMM=tcpip
  register: db2cmd
  when: ansible_os_family == 'Suse'