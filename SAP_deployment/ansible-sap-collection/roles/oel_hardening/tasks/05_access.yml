- name: "Ensure password creation requirements are configured"
  lineinfile:
    state: present
    dest: /etc/security/pwquality.conf
    regexp: '^{{ item.key }}'
    line: '{{ item.key }} = {{ item.value }}'
  with_items:
    - { key: 'minlen',  value: '14' }
    - { key: 'dcredit', value: '-1' }
    - { key: 'ucredit', value: '-1' }
    - { key: 'ocredit', value: '-1' }
    - { key: 'lcredit', value: '-1' }
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_password_creation_requirements is defined and oelcis_password_creation_requirements 
  tags:
    - level1
    
- name: "Ensure lockout for failed password attempts is configured"
  pamd:
    name: '{{item}}'
    type: auth
    control: sufficient
    module_path: pam_unix.so
    new_type: auth
    new_control: required
    new_module_path: pam_faillock.so
    module_arguments: preauth audit silent deny=5 unlock_time=900
    state: before
  ignore_errors: yes
  loop:
    - system-auth
    - password-auth
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_ad_ldap_joined_machine is defined and not oelcis_ad_ldap_joined_machine
  tags:
    - level1
    
- name: "Ensure lockout for failed password attempts is configured"
  pamd:
    name: '{{item}}'
    type: auth
    control: required
    module_path: pam_faillock.so
    module_arguments: preauth audit silent deny=5 unlock_time=900
    state: args_present
  ignore_errors: yes
  loop:
    - system-auth
    - password-auth
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_ad_ldap_joined_machine is defined and not oelcis_ad_ldap_joined_machine
  tags:
    - level1
    
