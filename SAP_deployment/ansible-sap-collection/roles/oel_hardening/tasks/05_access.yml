  pamd:
    name: '{{ item }}'
    type: auth
    control: required
    module_path: pam_faillock.so
    module_arguments: preauth audit silent deny=5 unlock_time=900
    state: absent
  ignore_errors: yes
  loop:
    - system-auth
    - password-auth
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_ad_ldap_joined_machine is defined and oelcis_ad_ldap_joined_machine
  tags:
    - level1
    
