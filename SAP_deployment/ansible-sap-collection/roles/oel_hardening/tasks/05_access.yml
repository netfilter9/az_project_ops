  template:
    src: etc/cron.allow.j2
    dest: /etc/cron.allow
    owner: root
    group: root
    mode: 0600
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_cron_allow_apply_template is defined and oelcis_cron_allow_apply_template
  tags:
