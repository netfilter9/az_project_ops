- name: 'Ensure password reuse is limited'
  shell: 'grep -q "^password\s*sufficient\s*pam_unix\.so" /etc/pam.d/system-auth'
  register: system_auth_password_check_pam_unix
  failed_when: 'system_auth_password_check_pam_unix.rc > 1'
  changed_when: false
  ignore_errors: yes
  become: yes
  when:
    - oelcis_level1 is defined and oelcis_level1
  tags:
    - level1
    
- name: 'Ensure password reuse is limited'
  shell: 'grep -q "^password\s+required\s+pam_pwhistory\.so" /etc/pam.d/system-auth'
  register: system_auth_password_check_pam_pwhistory
  failed_when: 'system_auth_password_check_pam_pwhistory.rc > 1'
  changed_when: false
  ignore_errors: yes
  become: yes
  when:
    - oelcis_level1 is defined and oelcis_level1
  tags:
    - level1
    
- name: 'Ensure password hashing algorithm is SHA-512'
  pamd:
    name: '{{ item }}'
    type: password
    control: sufficient
    module_path: 'pam_unix.so'
    module_arguments: 'sha512'
    state: args_present
  ignore_errors: yes
  loop:
    - system-auth
    - password-auth
  when:
    - oelcis_level1 is defined and oelcis_level1
  tags:
     - level1
     
- name: "Ensure password expiration warning days is 7 or more"
  lineinfile:
    state: present
    dest: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: 'PASS_WARN_AGE 7'
  when:
    - oelcis_level1 is defined and oelcis_level1
  tags:
    - level1
    
- name: "Ensure default group for the root account is GID 0"
  command: usermod -g 0 root
  when:
    - oelcis_level1 is defined and oelcis_level1
  tags:
    - level1
    
- name: "Ensure default user umask is 027 or more restrictive"
  lineinfile:
    state: present
    dest: /etc/bashrc
    regexp: 'umask'
    line: 'umask {{ oelcis_default_user_umask }}'
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_modify_default_user_umask is defined and oelcis_modify_default_user_umask
  tags:
    - level1
    
- name: "Ensure default user umask is 027 or more restrictive"
  lineinfile:
      state: present
      dest: /etc/profile
      regexp: 'umask'
      line: 'umask {{ oelcis_default_user_umask }}'
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_modify_default_user_umask is defined and oelcis_modify_default_user_umask
  tags:
    - level1
    
- name: "Ensure default user umask is 027 or more restrictive"
  find:
    paths: /etc/profile.d/
    recurse: yes
    patterns: "*.sh"
  register: profiled_dir
  when:
    - oelcis_level1 is defined and oelcis_level1
    - oelcis_modify_default_user_umask is defined and oelcis_modify_default_user_umask
  tags:
    - level1
    
- name: "Ensure default user shell timeout is 900 seconds or less"
  lineinfile:
    state: present
    dest: /etc/bashrc
    regexp: '^TMOUT'
    line: 'TMOUT=600'
  when:
    - oelcis_level2 is defined and oelcis_level2
  tags:
    - level2
    
- name: "Ensure default user shell timeout is 900 seconds or less"
  lineinfile:
    state: present
    dest: /etc/profile
    regexp: '^TMOUT'
    line: 'TMOUT=600'
  when:
    - oelcis_level2 is defined and oelcis_level2
  tags:
    - level2
    
- name: "Ensure access to the su command is restricted"
  lineinfile:
    state: present
    dest: /etc/group
    regexp: '^wheel:x:10:(.*)$'
    line: 'wheel:x:10:\1,root'
    backrefs: yes
  when:
    - oelcis_level1 is defined and oelcis_level1
  tags:
    - level1
    
- name: "Ensure access to the su command is restricted"
  lineinfile:
    state: present
    dest: /etc/pam.d/su
    regexp: '^#auth\s+required\s+pam_wheel\.so'
    line: 'auth           required        pam_wheel.so use_uid'
  when:
    - oelcis_level1 is defined and oelcis_level1
  tags:
    - level1