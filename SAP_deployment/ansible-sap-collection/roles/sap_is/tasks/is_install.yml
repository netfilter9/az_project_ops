- name: main | set installation directory facts
  set_fact:
    install_dir: "{{ root_dir | default ('/usr/sap')}}"

- name: main | create is.params
  template:
    src: "is.params.j2"
    dest: "{{ install_dir }}/{{ansible_hostname}}_is.params"
    mode: "0644"

- name: main | install
  command:
    cmd: ./setup.sh -r {{ install_dir }}/{{ ansible_hostname }}_is.params -InstallDir {{ IPS_dir }}
    creates: "{{ install_dir }}/sapinst/LOGS/islog_{{ ansible_hostname }}*.zip"
  args:
    chdir: "{{ install_dir }}/sapinst/IS/"
  register: isinstallresult
  become: yes
  become_user: "{{ admin_user }}"

- name: Create logs directory if it does not exist
  file:
    path: "{{ install_dir }}/sapinst/LOGS"
    state: directory
    mode: "0755"

- name: main | create zip file of installation logs
  archive:
    path: /tmp/sapinst_instdir
    dest: "{{ install_dir }}/sapinst/LOGS/sapinstlog_{{ ansible_hostname }}_{{ ansible_date_time.iso8601 }}.zip"
    format: zip
    force_archive: true
  when: isinstallresult.changed
  
- name: main | tidy up params
  file:
    path: "{{ install_dir }}/{{ansible_hostname}}_is.params"
    state: absent
