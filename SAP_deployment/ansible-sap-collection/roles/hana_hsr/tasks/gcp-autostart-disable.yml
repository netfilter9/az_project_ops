- name: cluster | stop hana
  command: "{{ item }}"
  loop:
    - su - {{ sap.db.sid|lower }}adm -c "sapcontrol -nr {{ sap.instance_numbers.db }} -function StopWait 600 10"
    - sleep 20
  

- name: Set the Autostart property to 0 in SAP HANA profile
  lineinfile:
    path: /usr/sap/{{ sap.db.sid | upper}}/SYS/profile/{{ sap.db.sid | upper }}_HDB{{ sap.instance_numbers.db }}_{{ virtual_hostname }}
    regexp: '^Autostart=1'
    line: Autostart=0
  

- name: cluster | start hana
  command: "{{ item }}"
  loop:
    - su - {{ sap.db.sid|lower }}adm -c "sapcontrol -nr {{ sap.instance_numbers.db }} -function StartWait 600 10"
    - sleep 20
  