---
- name: main | ensure required cluster agent packages are installed
  package:
    name: 
      - fence-agents
      - resource-agents
      - socat
    state: present
  when: (platform == 'azure' and ansible_os_family == 'Suse') or (platform == 'gcp' and ansible_os_family == 'Suse')

- name: main | logd start and enable
  service:
    name: logd
    state: started
    enabled: yes
  when: platform == 'aws' and ansible_os_family == 'Suse'

- name: main | Azure Python SDK installation
  import_tasks: sdk.yml
  tags:
    - sdk
  when: platform == 'azure' and ansible_os_family == 'Suse'

- name: main | setup os config
  import_tasks: os_config.yml
  tags:
    - os_config
  when: ansible_os_family == 'Suse'


- name: main | Set FireWall
  import_tasks: firewall.yml
  tags:
    - firewall
  when: 
    - platform == 'azure'
    - ansible_os_family == 'RedHat'

- name: main | setup PCS Service
  import_tasks: pcs_service.yml
  tags:
    - service
  when: ansible_os_family == 'RedHat'

- name: main | setup ssh keys
  import_tasks: ssh_key_setup.yml
  tags:
    - ssh

- name: main | create corosync.conf
  vars:
    primary_ip: "{{ hostvars[node1]['ansible_default_ipv4']['address'] }}"
    secondary_ip: "{{ hostvars[node2]['ansible_default_ipv4']['address'] }}"
  template:
    src: "gcp_corosync.j2"
    dest: "/etc/corosync/corosync.conf"
  when: 
    - platform == 'gcp'  
    - ansible_hostname == node1

- name: main | create corosync.conf
  vars:
    primary_ip: "{{ hostvars[node2]['ansible_default_ipv4']['address'] }}"
    secondary_ip: "{{ hostvars[node1]['ansible_default_ipv4']['address'] }}"
  template:
    src: "gcp_corosync.j2"
    dest: "/etc/corosync/corosync.conf"
  when: 
    - platform == 'gcp'  
    - ansible_hostname == node2

- name: main | run base ha cluster commands
  import_tasks: ha_cluster.yml
  tags:
    - ha_cluster
  when: (platform == 'azure' and ansible_os_family == 'Suse') or (platform == 'gcp' and ansible_os_family == 'Suse')

- name: main | run base ha cluster commands for RedHat
  import_tasks: pcs_ha_cluster.yml
  tags:
    - pcs_ha_cluster
  when: ansible_os_family == 'RedHat'

- name: main | perform corosync service tuning
  import_tasks: corosync.yml
  tags:
    - corosync
  when: 
    - platform == 'azure' 
    - ansible_os_family == 'Suse'

- name: main | perform corosync service tuning
  include_tasks: corosync.aws.yml
  tags:
    - corosync
  when: 
    - platform == 'aws'

- name: main | run stonith commands
  import_tasks: azure_stonith.yml
  tags:
    - azure_stonith
  when: 
    - platform == 'azure' 
    - ansible_os_family == 'RedHat'

- name: main | run stonith commands
  import_tasks: aws_stonith.yml
  tags:
    - aws_stonith
  when: 
    - platform == 'aws' 
    - ansible_os_family == 'RedHat'