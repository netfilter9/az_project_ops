---
- name: sdk | uninstall python3-azure-mgmt-compute
  package:
    name:
     - python3-azure-mgmt-compute
     - python-azure-mgmt-compute
    state: absent

- name: sdk | activating public cloud extensions
  command: "{{ item }}"
  loop:
    - SUSEConnect -p sle-module-public-cloud/12/x86_64
  when: ansible_distribution_major_version == '12'

- name: sdk | install python-azure-mgmt-compute-4.6.2
  command: "{{ item }}"
  loop:
    - sudo zypper install -y --oldpackage python-azure-mgmt-compute-4.6.2
  when: ansible_distribution_major_version == '12'

- name: sdk | activating public cloud extensions
  command: "{{ item }}"
  loop:
    - SUSEConnect -p sle-module-public-cloud/15.1/x86_64
  when: ansible_distribution_major_version == '15'

- name: sdk | install python3-azure-mgmt-compute-4.6.2
  command: "{{ item }}"
  loop:
    - sudo zypper install -y --oldpackage python3-azure-mgmt-compute-4.6.2
  when: ansible_distribution_major_version == '15'