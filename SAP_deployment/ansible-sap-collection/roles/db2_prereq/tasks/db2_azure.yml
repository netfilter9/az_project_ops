- name: packages | install packages
  package:
    name:
      - libstdc++*
      - mksh
      - ksh
      - ncurses-compat-libs
      - java-17-openjdk 
    state: present
  when: ansible_os_family == 'RedHat'

- name: comment 5912 ports(/etc/services)
  shell: sed -e '/5912/s/^/#/g' -i /etc/services

- name: comment 5913 ports(/etc/services)
  shell: sed -e '/5913/s/^/#/g' -i /etc/services  

