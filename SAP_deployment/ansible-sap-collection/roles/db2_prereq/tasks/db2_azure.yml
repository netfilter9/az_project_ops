- name: main | tweak grub
  include_tasks: grub.yml
  tags:
    - grub

- name: grub | copy in grub file
  replace:
    path: /etc/sysconfig/sapconf
    regexp: "{{ item.exp }}"
    replace: "{{ item.val }}"
  with_items:
    - { exp: "GOVERNOR=", val: "GOVERNOR=performance" }
    - { exp: "PERF_BIAS=", val: "PERF_BIAS=performance" }
