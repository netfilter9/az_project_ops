---
- name: Replace bold strings with your instance name db2sid, database SID, and virtual IP address/Azure Load Balancer.
  command: 
    cmd: pcs resource create Db2_HADR_{{ sap.db.sid|upper }} db2 instance="db2{{ sap.db.sid | lower }}" dblist="{{ sap.db.sid|upper }}" master meta notify=true resource-stickiness=5000
    creates: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileA*.log
  register: logfileA

- name:  write logfileA
  copy:
    dest: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileA_{{ ansible_date_time.iso8601 }}.log
    content: "{{ logfileA.stdout }}"

- name: Configure resource stickiness and correct cluster notifications for master resource
  command: 
    cmd: pcs resource update Db2_HADR_{{ sap.db.sid|upper }}-master meta notify=true resource-stickiness=5000
    creates: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileB*.log
  register: logfileB

- name:  write logfileB
  copy:
    dest: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileB_{{ ansible_date_time.iso8601 }}.log
    content: "{{ logfileB.stdout }}"

- name: Configure virtual IP - same as Azure Load Balancer IP
  command: 
    cmd: pcs resource create vip_db2{{ sap.db.sid | lower }}_{{ sap.db.sid|upper }} IPaddr2 ip={{ sap.lb_ip }}
    creates: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileC*.log
  register: logfileC

- name:  write logfileC
  copy:
    dest: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileC_{{ ansible_date_time.iso8601 }}.log
    content: "{{ logfileC.stdout }}"

- name: Configure probe port for Azure load Balancer
  command: 
    cmd: pcs resource create nc_db2{{ sap.db.sid | lower }}_{{ sap.db.sid|upper }} azure-lb port=62500
    creates: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileD*.log
  register: logfileD

- name:  write logfileD
  copy:
    dest: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileD_{{ ansible_date_time.iso8601 }}.log
    content: "{{ logfileD.stdout }}"

- name: Create a group for ip and Azure loadbalancer probe port
  command: 
    cmd: pcs resource group add g_ipnc_db2{{ sap.db.sid | lower }}_{{ sap.db.sid|upper }} vip_db2{{ sap.db.sid | lower }}_{{ sap.db.sid|upper }} nc_db2{{ sap.db.sid | lower }}_{{ sap.db.sid|upper }}
    creates: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileE*.log
  register: logfileE

- name:  write logfileE
  copy:
    dest: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileE_{{ ansible_date_time.iso8601 }}.log
    content: "{{ logfileE.stdout }}"

- name: Create colocation constrain - keep Db2 HADR Master and Group on same node
  command: 
    cmd: pcs constraint colocation add g_ipnc_db2{{ sap.db.sid | lower }}_{{ sap.db.sid|upper }} with master Db2_HADR_{{ sap.db.sid|upper }}-master
    creates: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileF*.log
  register: logfileF

- name:  write logfileF
  copy:
    dest: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileF_{{ ansible_date_time.iso8601 }}.log
    content: "{{ logfileF.stdout }}"

- name: Create start order constrain
  command:
    cmd: pcs constraint order promote Db2_HADR_{{ sap.db.sid|upper }}-master then g_ipnc_db2{{ sap.db.sid | lower }}_{{ sap.db.sid|upper }}
    creates: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileG*.log
  register: logfileG

- name:  write logfileG
  copy:
    dest: /db2/HRQ/logarch/{{ sap.db.sid|lower }}_logfileG_{{ ansible_date_time.iso8601 }}.log
    content: "{{ logfileG.stdout }}"